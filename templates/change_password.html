{% extends "base.html" %}
{% block title %}修改密碼{% endblock %}
{% block body %}
<div class="center-box">
  <div class="card">
    <header style="margin-bottom:14px;">
      <img class="logo-mark" src="{{ url_for('static', filename='img/logo.png') }}" alt="NUC SW Team logo">
      <h1 style="font-size:20px;" data-i18n="cpw.title">修改密碼</h1>
      <p data-i18n="{{ 'cpw.forced' if forced else 'cpw.normal' }}">{% if forced %}首次登入請設定新密碼{% else %}修改你的密碼{% endif %}</p>
    </header>
    <form method="POST" action="{{ url_for('auth.change_password') }}">
      <label class="fld" data-i18n="cpw.current">目前密碼</label>
      <input class="fld" type="password" name="current" required autofocus>
      <label class="fld" data-i18n="cpw.new" data-n="{{ min_len }}">新密碼（至少 {{ min_len }} 碼）</label>
      <input class="fld" type="password" name="new" required>
      <label class="fld" data-i18n="cpw.confirm">再次輸入新密碼</label>
      <input class="fld" type="password" name="confirm" required>
      <button class="btn" style="width:100%;margin-top:20px;justify-content:center;" type="submit" data-i18n="btn.updatepw">更新密碼</button>
    </form>
    <div class="msg {{ msg_cls }}">{{ msg }}</div>
  </div>
</div>
{% endblock %}
